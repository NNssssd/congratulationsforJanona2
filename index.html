<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>С днём рождения, Джанона 💖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink-1: #e8ccd8;
      --pink-2: #d4a8bc;
      --pink-3: #c090a8;
      --pink-deep: #8f5a72;
      --pearl: #e4d8e0;
      --glass: rgba(255, 250, 252, 0.22);
      --glass-border: rgba(255, 245, 250, 0.38);
      --shadow-soft: 0 10px 36px rgba(60, 35, 48, 0.18);
      --glow: 0 0 28px rgba(150, 90, 115, 0.22);
      --font-display: "Cormorant Garamond", Georgia, serif;
      --font-body: "Nunito", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
    }

    body {
      font-family: var(--font-body);
      color: #3f2c38;
      overflow-x: hidden;
      background: var(--pearl);
    }

    /* --- Animated background --- */
    .bg-stage {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 120% 80% at 10% 20%, rgba(180, 120, 145, 0.35), transparent 52%),
        radial-gradient(ellipse 100% 70% at 90% 80%, rgba(175, 140, 160, 0.38), transparent 48%),
        radial-gradient(circle at 50% 50%, #e8dde3 0%, #d9c8d4 42%, #cbb8c4 100%);
    }

    .bg-dots {
      position: absolute;
      inset: 0;
      opacity: 0.28;
      background-image: radial-gradient(circle, rgba(120, 80, 100, 0.35) 1px, transparent 1px);
      background-size: 14px 14px;
      animation: driftDots 80s linear infinite;
    }

    @keyframes driftDots {
      from { transform: translate(0, 0); }
      to { transform: translate(-14px, -14px); }
    }

    .petal {
      position: absolute;
      width: clamp(72px, 18vw, 140px);
      height: clamp(72px, 18vw, 140px);
      border-radius: 60% 40% 55% 45% / 55% 45% 55% 45%;
      background: linear-gradient(145deg, rgba(200, 140, 165, 0.72), rgba(160, 110, 135, 0.45));
      box-shadow:
        inset 0 -8px 20px rgba(255, 255, 255, 0.35),
        inset 0 4px 12px rgba(255, 248, 252, 0.55),
        0 12px 36px rgba(70, 40, 55, 0.2);
      filter: blur(0.5px);
      opacity: 0.68;
      animation: floatPetal 12s ease-in-out infinite;
      pointer-events: none;
    }

    .petal::after {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: inherit;
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.28), transparent);
    }

    .petal.tl { top: -4%; left: -3%; transform: rotate(-25deg); animation-delay: 0s; }
    .petal.tr { top: 2%; right: -4%; transform: rotate(35deg); animation-delay: -3s; }
    .petal.bl { bottom: -2%; left: 2%; width: clamp(60px, 15vw, 110px); height: clamp(60px, 15vw, 110px); transform: rotate(15deg); animation-delay: -5s; }
    .petal.br { bottom: 4%; right: -2%; width: clamp(64px, 16vw, 120px); height: clamp(64px, 16vw, 120px); transform: rotate(-40deg); animation-delay: -2s; }

    @keyframes floatPetal {
      0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); }
      50% { transform: translate(6px, -10px) rotate(calc(var(--r, 0deg) + 6deg)); }
    }

    /* Фоновые ветки цветов (цветок 4) — за main.app */
    .bg-flower {
      position: absolute;
      pointer-events: none;
      user-select: none;
      width: clamp(100px, 28vw, 210px);
      height: auto;
      object-fit: contain;
      opacity: 0.7;
      filter: drop-shadow(0 12px 32px rgba(55, 35, 48, 0.16));
      z-index: 1;
    }

    .bg-flower--1 {
      top: -5%;
      left: -7%;
      transform: rotate(-24deg);
    }

    .bg-flower--2 {
      top: 2%;
      right: -9%;
      transform: rotate(31deg);
    }

    .bg-flower--3 {
      bottom: -6%;
      right: -5%;
      transform: rotate(-42deg);
    }

    .sparkle-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 248, 252, 0.95);
      box-shadow: 0 0 6px 1px rgba(255, 245, 250, 0.65), 0 0 14px 3px rgba(160, 100, 125, 0.35);
      opacity: 0;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 0.9; transform: scale(1); }
      60% { opacity: 0.3; }
    }

    .dust {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 250, 252, 0.55);
      animation: dustFloat 18s linear infinite;
      pointer-events: none;
    }

    @keyframes dustFloat {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-20vh) translateX(40px); opacity: 0; }
    }

    /* --- Layout shell --- */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }

    /* --- Glass card base --- */
    .glass-card {
      width: min(100%, 420px);
      position: relative;
      border-radius: 28px;
      padding: clamp(20px, 5vw, 32px);
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(1.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
      border: 1px solid var(--glass-border);
      box-shadow:
        var(--shadow-soft),
        inset 0 1px 0 rgba(255, 250, 252, 0.55),
        inset 0 -20px 50px rgba(120, 70, 90, 0.08),
        var(--glow);
      overflow: hidden;
    }

    .glass-card::before {
      content: "";
      position: absolute;
      top: -40%;
      left: -30%;
      width: 80%;
      height: 80%;
      background: radial-gradient(circle, rgba(255, 250, 252, 0.32) 0%, transparent 65%);
      pointer-events: none;
      animation: sheen 8s ease-in-out infinite;
    }

    .glass-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(125deg, transparent 40%, rgba(255, 250, 252, 0.14) 48%, transparent 55%);
      pointer-events: none;
      animation: glossMove 6s ease-in-out infinite;
    }

    @keyframes sheen {
      0%, 100% { opacity: 0.6; transform: translate(0, 0); }
      50% { opacity: 1; transform: translate(12%, 8%); }
    }

    @keyframes glossMove {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.55; }
    }

    h1 {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.75rem, 6vw, 2.25rem);
      text-align: center;
      letter-spacing: 0.04em;
      color: #4a2f3d;
      text-shadow: 0 2px 16px rgba(100, 60, 78, 0.2);
      position: relative;
      z-index: 2;
    }

    .sub {
      text-align: center;
      font-size: 0.95rem;
      color: #5c4654;
      margin-top: 8px;
      position: relative;
      z-index: 2;
    }

    .sub-flower {
      display: inline-block;
      vertical-align: -0.22em;
      height: 1.2em;
      width: auto;
      max-height: 22px;
      object-fit: contain;
      margin-left: 0.12em;
    }

    /* --- Countdown --- */
    #screen-countdown {
      display: none;
      width: min(100%, 400px);
    }

    #screen-countdown.active {
      display: block;
      animation: fadeUp 0.9s ease forwards;
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 24px;
      position: relative;
      z-index: 2;
    }

    .count-cell {
      text-align: center;
      padding: 12px 6px;
      border-radius: 16px;
      background: rgba(55, 40, 50, 0.12);
      border: 1px solid rgba(255, 245, 250, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 250, 252, 0.35);
    }

    .count-cell .num {
      font-family: var(--font-display);
      font-size: clamp(1.35rem, 5vw, 1.75rem);
      font-weight: 600;
      color: #4a3040;
    }

    .count-cell .lbl {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6a5562;
      margin-top: 4px;
    }

    /* --- Main birthday flow --- */
    #screen-birthday {
      display: none;
      width: min(100%, 440px);
    }

    #screen-birthday.active {
      display: block;
    }

    #lock-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background:
        radial-gradient(ellipse 95% 65% at 50% 22%, rgba(255, 228, 238, 0.55), transparent 58%),
        radial-gradient(ellipse 120% 80% at 80% 100%, rgba(220, 175, 195, 0.35), transparent 45%),
        radial-gradient(ellipse 100% 70% at 10% 90%, rgba(210, 170, 190, 0.3), transparent 50%),
        radial-gradient(ellipse at 50% 30%, rgba(200, 175, 192, 0.92), rgba(175, 150, 170, 0.88)),
        var(--pearl);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    #lock-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 45% at 50% 32%, rgba(255, 245, 250, 0.5), transparent 65%),
        linear-gradient(165deg, rgba(255, 240, 248, 0.22) 0%, transparent 42%, rgba(235, 200, 218, 0.15) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #lock-overlay::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(55, 38, 50, 0.14) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #lock-overlay.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-12px);
    }

    .lock-overlay__scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .lock-overlay__mega-flower {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(118vw, 640px);
      max-width: min(96vmin, 640px);
      max-height: min(88vmin, 720px);
      object-fit: contain;
      object-position: center;
      opacity: 0.52;
      filter: drop-shadow(0 20px 50px rgba(90, 55, 72, 0.18));
      z-index: 0;
    }

    .lock-overlay__fl {
      position: absolute;
      object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 8px 22px rgba(70, 45, 58, 0.12));
      opacity: 0.62;
      z-index: 1;
    }

    .lock-overlay__fl--1 {
      bottom: 6%;
      left: -4%;
      width: clamp(72px, 20vw, 150px);
      transform: rotate(18deg);
    }

    .lock-overlay__fl--2 {
      top: 12%;
      left: -5%;
      width: clamp(64px, 17vw, 130px);
      transform: rotate(-26deg);
      opacity: 0.55;
    }

    .lock-overlay__fl--3 {
      bottom: 14%;
      right: -6%;
      width: clamp(68px, 18vw, 138px);
      transform: rotate(-22deg);
    }

    .lock-overlay__fl--4 {
      top: 22%;
      right: -3%;
      width: clamp(58px, 15vw, 115px);
      transform: rotate(24deg);
      opacity: 0.48;
    }

    .lock-glass {
      position: relative;
      z-index: 2;
      width: min(90%, 340px);
      padding: 32px 24px;
      border-radius: 24px;
      background: rgba(40, 32, 40, 0.22);
      backdrop-filter: blur(20px) saturate(1.15);
      -webkit-backdrop-filter: blur(20px) saturate(1.15);
      border: 1px solid rgba(255, 245, 250, 0.38);
      box-shadow:
        var(--shadow-soft),
        var(--glow),
        inset 0 1px 0 rgba(255, 250, 252, 0.35);
      text-align: center;
    }

    .lock-glass::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255, 250, 252, 0.12) 0%, transparent 48%, rgba(255, 220, 235, 0.08) 100%);
      pointer-events: none;
    }

    .lock-hint {
      font-family: var(--font-display);
      font-size: 1.35rem;
      color: #3d2833;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    .lock-subhint {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: #6a5562;
      margin-bottom: 22px;
      line-height: 1.45;
      position: relative;
      z-index: 1;
      opacity: 0.92;
    }

    .swipe-track {
      position: relative;
      z-index: 1;
      height: 56px;
      border-radius: 28px;
      background: rgba(45, 35, 42, 0.15);
      border: 1px solid rgba(255, 245, 250, 0.35);
      box-shadow: inset 0 2px 8px rgba(40, 25, 35, 0.12);
      overflow: hidden;
    }

    .swipe-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0;
      border-radius: 28px;
      background: linear-gradient(90deg, rgba(180, 130, 155, 0.45), rgba(150, 100, 125, 0.55));
      transition: width 0.05s linear;
    }

    .swipe-knob {
      position: absolute;
      left: 4px;
      top: 50%;
      width: 48px;
      height: 48px;
      margin-top: -24px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f5eef2 0%, #dcc6d2 100%);
      border: 1px solid rgba(255, 250, 252, 0.55);
      box-shadow:
        0 4px 14px rgba(60, 35, 48, 0.22),
        inset 0 2px 4px rgba(255, 255, 255, 0.65);
      cursor: grab;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 2;
    }

    .swipe-knob-img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      object-position: center;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .swipe-knob:active {
      cursor: grabbing;
    }

    .swipe-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #5c4a55;
      pointer-events: none;
      padding-left: 52px;
      z-index: 1;
    }

    #birthday-inner {
      opacity: 0;
      transform: scale(0.96) translateY(12px);
      transition: opacity 0.9s ease 0.15s, transform 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s;
    }

    #birthday-inner.revealed {
      opacity: 1;
      transform: scale(1) translateY(0);
    }

    .photo-frame {
      position: relative;
      z-index: 2;
      margin: 20px auto 16px;
      width: min(220px, 70vw);
      aspect-ratio: 3/4;
      border-radius: 20px;
      padding: 8px;
      background: linear-gradient(145deg, rgba(255, 250, 252, 0.38), rgba(180, 145, 165, 0.28));
      border: 1px solid rgba(255, 245, 250, 0.4);
      box-shadow:
        0 8px 28px rgba(50, 32, 42, 0.2),
        inset 0 1px 0 rgba(255, 250, 252, 0.45),
        0 0 22px rgba(120, 75, 95, 0.18);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      background: linear-gradient(160deg, #dcc6d2, #c4a0b4);
    }

    /* --- Glass music player --- */
    .glass-player {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 320px;
      margin: 18px auto 0;
      padding: 16px 18px 14px;
      border-radius: 24px;
      background: rgba(255, 250, 252, 0.22);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border: 1px solid rgba(255, 245, 250, 0.42);
      box-shadow:
        0 8px 28px rgba(50, 32, 42, 0.12),
        inset 0 1px 0 rgba(255, 250, 252, 0.55),
        inset 0 -12px 32px rgba(120, 75, 95, 0.06),
        var(--glow);
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.35s ease;
    }

    .glass-player::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -20%;
      width: 70%;
      height: 100%;
      background: radial-gradient(circle, rgba(255, 250, 252, 0.35) 0%, transparent 62%);
      pointer-events: none;
      animation: playerSheen 7s ease-in-out infinite;
    }

    .glass-player::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(118deg, transparent 38%, rgba(255, 250, 252, 0.12) 48%, transparent 58%);
      pointer-events: none;
      animation: glossMove 5s ease-in-out infinite;
    }

    @keyframes playerSheen {
      0%, 100% { opacity: 0.5; transform: translate(0, 0); }
      50% { opacity: 0.85; transform: translate(8%, 6%); }
    }

    .glass-player.is-playing {
      animation: playerPulse 2.4s ease-in-out infinite;
      box-shadow:
        0 10px 32px rgba(50, 32, 42, 0.14),
        inset 0 1px 0 rgba(255, 250, 252, 0.55),
        0 0 36px rgba(180, 120, 145, 0.28);
    }

    @keyframes playerPulse {
      0%, 100% { box-shadow: 0 10px 32px rgba(50, 32, 42, 0.14), inset 0 1px 0 rgba(255, 250, 252, 0.55), 0 0 28px rgba(160, 100, 125, 0.22); }
      50% { box-shadow: 0 12px 36px rgba(50, 32, 42, 0.16), inset 0 1px 0 rgba(255, 250, 252, 0.6), 0 0 44px rgba(190, 130, 155, 0.35); }
    }

    .glass-player__deco {
      position: absolute;
      top: 8px;
      right: 12px;
      display: flex;
      gap: 6px;
      pointer-events: none;
      opacity: 0.45;
      font-size: 0.65rem;
      color: var(--pink-deep);
      z-index: 1;
    }

    .glass-player__heart {
      animation: heartWink 3s ease-in-out infinite;
    }

    .glass-player__heart:nth-child(2) {
      animation-delay: 0.6s;
    }

    @keyframes heartWink {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.75; transform: scale(1.15); }
    }

    .glass-player__vinyl-wrapper {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass-player__vinyl {
      width: 120%;
      height: 120%;
      object-fit: contain;
      border-radius: 50%;
      transition: transform 0.3s ease;
      filter: drop-shadow(0 4px 12px rgba(50, 32, 42, 0.15));
    }

    .glass-player.is-playing .glass-player__vinyl {
      animation: spinVinyl 3s linear infinite;
    }

    @keyframes spinVinyl {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .glass-player__title {
      position: relative;
      z-index: 2;
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: #4a3040;
      text-align: center;
      margin: 0 0 12px;
      padding: 0 28px;
      line-height: 1.3;
    }

    .glass-player__title.is-error {
      font-size: 0.82rem;
      font-weight: 500;
      color: #7a5565;
    }

    .glass-player__controls {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .glass-player__play {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, rgba(255, 250, 252, 0.65), rgba(200, 155, 175, 0.4));
      border: 1px solid rgba(255, 245, 250, 0.55);
      box-shadow:
        0 6px 20px rgba(50, 32, 42, 0.15),
        inset 0 2px 4px rgba(255, 255, 255, 0.65);
      color: #4a3040;
      transition: transform 0.2s ease, box-shadow 0.25s ease;
    }

    .glass-player__play:hover,
    .glass-player__play:focus-visible {
      transform: scale(1.06);
      box-shadow:
        0 8px 26px rgba(120, 75, 95, 0.22),
        inset 0 2px 4px rgba(255, 255, 255, 0.7);
      outline: none;
    }

    .glass-player__play:active {
      transform: scale(0.96);
    }

    .glass-player__play svg {
      width: 26px;
      height: 26px;
      display: block;
    }

    .glass-player__play .icon-pause {
      display: none;
    }

    .glass-player.is-playing .glass-player__play .icon-play {
      display: none;
    }

    .glass-player.is-playing .glass-player__play .icon-pause {
      display: block;
    }

    .glass-player__play .icon-play,
    .glass-player__play .icon-pause {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .glass-player__bar-wrap {
      position: relative;
      z-index: 2;
      padding: 4px 0 8px;
    }

    .glass-player__bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(45, 35, 42, 0.12);
      border: 1px solid rgba(255, 245, 250, 0.35);
      box-shadow: inset 0 1px 3px rgba(50, 32, 42, 0.08);
      cursor: pointer;
      touch-action: none;
      position: relative;
      overflow: hidden;
    }

    .glass-player__bar-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(180, 130, 155, 0.75), rgba(210, 160, 185, 0.85));
      box-shadow: 0 0 12px rgba(190, 130, 155, 0.35);
      transition: width 0.08s linear;
    }

    .glass-player__bar.is-dragging .glass-player__bar-fill {
      transition: none;
    }

    .glass-player__time {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: #6a5562;
      padding: 0 2px;
    }

    .glass-player__time-sep {
      opacity: 0.45;
      user-select: none;
    }

    /* --- Chat bubbles --- */
    .chat-wrap {
      margin-top: 18px;
      position: relative;
      z-index: 2;
      min-height: 120px;
    }

    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .typing-row.visible {
      opacity: 1;
    }

    .typing-bubble {
      padding: 12px 16px;
      border-radius: 18px 18px 18px 6px;
      background: rgba(255, 250, 252, 0.38);
      border: 1px solid rgba(255, 245, 250, 0.4);
      box-shadow: 0 4px 14px rgba(50, 32, 42, 0.1);
      font-size: 0.88rem;
      color: #5c4654;
    }

    .dots {
      display: inline-flex;
      gap: 4px;
    }

    .dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--pink-deep);
      animation: bounceDot 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.15s; }
    .dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounceDot {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .msg-bubble {
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: 18px 18px 18px 6px;
      background: rgba(255, 250, 252, 0.42);
      border: 1px solid rgba(255, 245, 250, 0.42);
      box-shadow: 0 6px 20px rgba(50, 32, 42, 0.12);
      font-size: 0.92rem;
      line-height: 1.55;
      color: #3f2c38;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .msg-bubble.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .msg-bubble .typed {
      white-space: pre-wrap;
    }

    /* --- Hearts (touch) --- */
    .heart-float {
      position: fixed;
      font-size: 1.5rem;
      pointer-events: none;
      z-index: 200;
      animation: heartFly 1.1s ease-out forwards;
    }

    @keyframes heartFly {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.6) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -180%) scale(1.2) rotate(25deg);
      }
    }

    /* --- Confetti canvas --- */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .petal, .bg-dots, .spark, .dust, .glass-card::before, .glass-card::after,
      .glass-player::before, .glass-player::after, .glass-player.is-playing,
      .glass-player__heart {
        animation: none !important;
      }
      .heart-float {
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <main class="app">

      </div>

    </section>

    <!-- 6 апреля -->
    <section id="screen-birthday" class="glass-card">
      <div id="birthday-inner">
        <h1>С ДНЁМ РОЖДЕНИЯ!</h1>

                <path d="M8 5v14l11-7L8 5z" />

          <div class="glass-player__bar-wrap">
            <div class="glass-player__bar" id="player-bar" role="slider" tabindex="0" aria-label="Прогресс трека" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div class="glass-player__bar-fill" id="player-bar-fill"></div>

          <div class="glass-player__time">
            <span id="player-time-curr">0:00</span>

              печатает
              <span class="dots" aria-hidden="true"><span></span><span></span><span></span></span>

  <div id="lock-overlay" role="dialog" aria-label="Разблокировка">
    <div class="lock-overlay__scene" aria-hidden="true">
      <img class="lock-overlay__mega-flower" src="фотки/цветок%203.png" alt="" decoding="async" />

  <!-- Положи рядом с index.html файл music.mp3 (или поменяй путь ниже) -->
  <audio id="bg-audio" loop preload="metadata">
    <source src="звуки/Cigarettes After Sex-Stop Waiting.mp3" type="audio/mpeg" />
  </audio>

  <script>
    (function () {
      const MONTH_APRIL = 3; // 0-based

      function isPreviewMode() {
        try {
          if (new URLSearchParams(window.location.search).get("preview") === "1") return true;
        } catch (e) {}
        return /(^|\/)preview\.html$/i.test(window.location.pathname || "");
      }

      function isBirthdayToday() {
        if (isPreviewMode()) return true;
        const d = new Date();
        return d.getMonth() === MONTH_APRIL && d.getDate() === 6;
      }

      if (isPreviewMode()) {
        var t = document.title;
        if (t.indexOf("Превью") === -1) document.title = "Превью — " + t;
      }

      function nextApril6() {
        const now = new Date();
        let y = now.getFullYear();
        let target = new Date(y, MONTH_APRIL, 6, 0, 0, 0, 0);
        if (now >= target) {
          y += 1;
          target = new Date(y, MONTH_APRIL, 6, 0, 0, 0, 0);
        }
        return target;
      }

      const elCd = document.getElementById("screen-countdown");
      const elBd = document.getElementById("screen-birthday");
      const lockOverlay = document.getElementById("lock-overlay");
      const birthdayInner = document.getElementById("birthday-inner");

      function tickCountdown() {
        const target = nextApril6();
        const now = Date.now();
        let diff = Math.max(0, target - now);
        const s = Math.floor(diff / 1000) % 60;
        const m = Math.floor(diff / 60000) % 60;
        const h = Math.floor(diff / 3600000) % 24;
        const days = Math.floor(diff / 86400000);
        document.getElementById("cd-days").textContent = String(days);
        document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
        document.getElementById("cd-mins").textContent = String(m).padStart(2, "0");
        document.getElementById("cd-secs").textContent = String(s).padStart(2, "0");
      }

      if (isBirthdayToday()) {
        elBd.classList.add("active");
        lockOverlay.classList.remove("hidden");
      } else {
        elCd.classList.add("active");
        tickCountdown();
        setInterval(tickCountdown, 1000);
        lockOverlay.classList.add("hidden");
        lockOverlay.setAttribute("aria-hidden", "true");
      }

      /* Sparkles + dust */
      const sparkLayer = document.getElementById("sparkle-layer");
      for (let i = 0; i < 28; i++) {
        const sp = document.createElement("div");
        sp.className = "spark";
        sp.style.left = Math.random() * 100 + "%";
        sp.style.top = Math.random() * 100 + "%";
        sp.style.animationDelay = Math.random() * 4 + "s";
        sparkLayer.appendChild(sp);
      }
      for (let i = 0; i < 14; i++) {
        const d = document.createElement("div");
        d.className = "dust";
        d.style.left = Math.random() * 100 + "%";
        d.style.animationDelay = Math.random() * 18 + "s";
        d.style.animationDuration = 14 + Math.random() * 12 + "s";
        sparkLayer.appendChild(d);
      }

      /* Photo: show img if src set */
      const heroPhoto = document.getElementById("hero-photo");
      function syncPhoto() {
        const src = (heroPhoto.getAttribute("src") || "").trim();
        heroPhoto.hidden = !src;
      }
      heroPhoto.addEventListener("load", syncPhoto);
      heroPhoto.addEventListener("error", function () {
        heroPhoto.hidden = true;
      });
      syncPhoto();

      /* Swipe unlock */
      const track = document.getElementById("swipe-track");
      const knob = document.getElementById("swipe-knob");
      const fill = document.getElementById("swipe-fill");
      const swipeLabel = document.getElementById("swipe-label");
      let dragging = false;
      let startX = 0;
      let startLeft = 0;
      const padding = 4;

      function maxKnobLeft() {
        return track.clientWidth - knob.clientWidth - padding * 2;
      }

      function setKnobLeft(px) {
        const max = maxKnobLeft();
        const x = Math.max(padding, Math.min(max, px));
        knob.style.left = x + "px";
        const p = max <= 0 ? 0 : ((x - padding) / max) * 100;
        fill.style.width = p + "%";
        knob.setAttribute("aria-valuenow", Math.round(p));
        swipeLabel.style.opacity = String(1 - p / 120);
      }

      function unlock() {
        lockOverlay.classList.add("hidden");
        lockOverlay.setAttribute("aria-hidden", "true");
        birthdayInner.classList.add("revealed");
        startConfetti();
        startChatSequence();
        // Auto-play music when birthday screen opens
        setTimeout(function() {
          audio.play().then(function () {
            setPlayingUI(true);
            playerTrackTitle.classList.remove("is-error");
          }).catch(function () {
            playerTrackTitle.textContent = "Не удалось включить — положи music.mp3 рядом с сайтом";
            playerTrackTitle.classList.add("is-error");
            setPlayingUI(false);
          });
        }, 1000);
      }

      let unlocked = false;
      function tryUnlock() {
        if (unlocked || !isBirthdayToday()) return;
        const max = maxKnobLeft();
        const x = parseFloat(knob.style.left) || padding;
        if (max > 0 && x >= max - 6) {
          unlocked = true;
          setKnobLeft(max + padding);
          fill.style.width = "100%";
          setTimeout(unlock, 180);
        }
      }

      function onPointerDown(e) {
        if (!isBirthdayToday() || unlocked) return;
        dragging = true;
        startX = e.clientX;
        startLeft = parseFloat(knob.style.left) || padding;
        knob.setPointerCapture(e.pointerId);
      }

      function onPointerMove(e) {
        if (!dragging || unlocked) return;
        const dx = e.clientX - startX;
        setKnobLeft(startLeft + dx);
      }

      function onPointerUp(e) {
        if (!dragging) return;
        dragging = false;
        try {
          knob.releasePointerCapture(e.pointerId);
        } catch (_) {}
        const max = maxKnobLeft();
        const x = parseFloat(knob.style.left) || padding;
        if (!unlocked && x < max - 6) {
          knob.style.transition = "left 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
          fill.style.transition = "width 0.35s cubic-bezier(0.22, 1, 0.36, 1)";
          setKnobLeft(padding);
          setTimeout(function () {
            knob.style.transition = "";
            fill.style.transition = "";
          }, 400);
        } else {
          tryUnlock();
        }
      }

      if (isBirthdayToday()) {
        setKnobLeft(padding);
        knob.addEventListener("pointerdown", onPointerDown);
        knob.addEventListener("pointermove", onPointerMove);
        knob.addEventListener("pointerup", onPointerUp);
        knob.addEventListener("pointercancel", onPointerUp);
        window.addEventListener("resize", function () {
          if (!unlocked) setKnobLeft(padding);
        });
      }

      /* Touch hearts */
      document.body.addEventListener(
        "pointerdown",
        function (e) {
          if (e.target.closest("#swipe-knob") || e.target.closest(".glass-player")) return;
          const h = document.createElement("span");
          h.className = "heart-float";
          h.textContent = "💖";
          h.style.left = e.clientX + "px";
          h.style.top = e.clientY + "px";
          document.body.appendChild(h);
          setTimeout(function () {
            h.remove();

        },
        { passive: true }

      /* Glass music player */
      const audio = document.getElementById("bg-audio");
      const glassPlayer = document.getElementById("glass-player");
      const playerPlay = document.getElementById("player-play");
      const playerBar = document.getElementById("player-bar");
      const playerBarFill = document.getElementById("player-bar-fill");
      const playerTimeCurr = document.getElementById("player-time-curr");
      const playerTimeDur = document.getElementById("player-time-dur");
      const playerTrackTitle = document.getElementById("player-track-title");
      const defaultTitle = (glassPlayer && glassPlayer.getAttribute("data-track-title")) || "Трек";

      // Set initial volume to 37%
      audio.volume = 0.37;


      function formatTime(sec) {
        if (!isFinite(sec) || sec < 0) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ":" + String(s).padStart(2, "0");
      }

      function updateProgressUI() {
        const d = audio.duration;
        const t = audio.currentTime;
        const pct = isFinite(d) && d > 0 ? (t / d) * 100 : 0;
        playerBarFill.style.width = pct + "%";
        playerTimeCurr.textContent = formatTime(t);
        playerTimeDur.textContent = isFinite(d) ? formatTime(d) : "—:—";
        var aria = Math.round(pct);
        playerBar.setAttribute("aria-valuenow", String(aria));
      }

      function setPlayingUI(playing) {
        glassPlayer.classList.toggle("is-playing", playing);
        playerPlay.setAttribute("aria-pressed", playing ? "true" : "false");
        playerPlay.setAttribute("aria-label", playing ? "Пауза" : "Воспроизвести");
      }

      playerPlay.addEventListener("click", function () {
        if (audio.paused) {
          audio.play().then(function () {
            setPlayingUI(true);
            playerTrackTitle.classList.remove("is-error");
          }).catch(function () {
            playerTrackTitle.textContent = "Не удалось включить — положи music.mp3 рядом с сайтом";
            playerTrackTitle.classList.add("is-error");
            setPlayingUI(false);
          });
        } else {
          audio.pause();
          setPlayingUI(false);
        }
      });

      audio.addEventListener("timeupdate", updateProgressUI);
      audio.addEventListener("loadedmetadata", function () {
        playerTrackTitle.textContent = defaultTitle;
        playerTrackTitle.classList.remove("is-error");
        updateProgressUI();
      });
      audio.addEventListener("ended", function () {
        if (!audio.loop) {
          setPlayingUI(false);
          updateProgressUI();
        }
      });
      audio.addEventListener("pause", function () {
        setPlayingUI(false);
      });
      audio.addEventListener("play", function () {
        setPlayingUI(true);
      });

      function seekFromClientX(clientX) {
        const rect = playerBar.getBoundingClientRect();
        const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        if (isFinite(audio.duration) && audio.duration > 0) {
          audio.currentTime = ratio * audio.duration;
          updateProgressUI();
        }
      }

      let barDrag = false;
      playerBar.addEventListener("pointerdown", function (e) {
        barDrag = true;
        playerBar.classList.add("is-dragging");
        playerBar.setPointerCapture(e.pointerId);
        seekFromClientX(e.clientX);
      });
      playerBar.addEventListener("pointermove", function (e) {
        if (!barDrag) return;
        seekFromClientX(e.clientX);
      });
      function endBarDrag(e) {
        if (!barDrag) return;
        barDrag = false;
        playerBar.classList.remove("is-dragging");
        try {
          playerBar.releasePointerCapture(e.pointerId);
        } catch (err) {}
      }
      playerBar.addEventListener("pointerup", endBarDrag);
      playerBar.addEventListener("pointercancel", endBarDrag);

      playerBar.addEventListener("keydown", function (e) {
        if (!isFinite(audio.duration) || audio.duration <= 0) return;
        var step = 5;
        if (e.key === "ArrowRight" || e.key === "ArrowUp") {
          audio.currentTime = Math.min(audio.duration, audio.currentTime + step);
          e.preventDefault();
          updateProgressUI();
        } else if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
          audio.currentTime = Math.max(0, audio.currentTime - step);
          e.preventDefault();
          updateProgressUI();
        }
      });

      playerTrackTitle.textContent = defaultTitle;
      updateProgressUI();

      /* Chat message */
      const fullMessage =
        "Джаноночка\n\n" +
        "Мое благословение от Всевышнего\n\n" +
        "Я так люблю апрель, 6 число, потому что этот день подарил тебя💘\n\n" +
        "Говорят, мы - это те, кто нас окружает. И думая об этом, я не могу поверить в то, как мне повезло, что есть ты в моей жизни.\n\n" +
        "За эти годы много душевных слов сказано и я уже не знаю как тебе признаться в моей безусловной к тебе любви😂😂💘 Ее уже словами не выразить\n\n" +
        "С каждым годом она растет и крепнет, моя Жан💘\n\n" +
        "Ты мой самый любимый человек на этом свете.💘\n\n" +
        "Ты всегда на 1 месте, помни это и помни, что мы все преодолеем вместе, я всегда рядом, хоть нас сейчас и разделяет расстояние, я уверена, это ненадолго🥹💘\n\n" +
        "Смотря в прошлое наше, я так горжусь тем, кем ты становишься, как растешь, становишься очень мудрой прекрасной девушкой, я вижу твои достижения и так горжусь тобой, ты цветешь, ты взрослеешь и я вместе с тобой переживая различные эмоции, чувства и события💘\n\n" +
        "Мы пройдем еще через стоооолько всего, и без тебя не было бы меня, не было б всего этого прекрасного, ведь прекрасное это и есть ты, моя Джинни💘\n\n" +
        "Я очень сильно тебя люблю, обожаю, дорожу тобой сииильнооо. Пожалуйста, всегда будь со мной, а я буду с тобой в любом положении\n\n" +
        "Навсегда ♾️ мы связаны, мы предписаны были друг другу еще задолго до создания нас, я так счастлива осознавая это и что именно ТЫ моя ЛУЧШАЯ ПОДРУГА = моя СЕСТРА по сердцу";

      const typingRow = document.getElementById("typing-row");
      const msgBubble = document.getElementById("msg-bubble");
      const typedText = document.getElementById("typed-text");
      let chatStarted = false;

      function startChatSequence() {
        if (chatStarted || !isBirthdayToday()) return;
        chatStarted = true;
        typingRow.classList.add("visible");
        setTimeout(function () {
          typingRow.classList.remove("visible");
          msgBubble.classList.add("visible");
          let i = 0;
          function typeChar() {
            if (i <= fullMessage.length) {
              typedText.textContent = fullMessage.slice(0, i);
              i += 1;
              const delay = fullMessage[i - 1] === "\n" ? 280 : 18 + Math.random() * 22;
              setTimeout(typeChar, delay);
            }
          }
          typeChar();
        }, 2200);
      }

      /* Soft confetti */
      const canvas = document.getElementById("confetti-canvas");
      const ctx = canvas.getContext("2d");
      let confettiPieces = [];
      let confettiActive = false;
      let rafId = 0;

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      function startConfetti() {
        if (confettiActive || !isBirthdayToday()) return;
        confettiActive = true;
        const colors = ["#c9a0b4", "#b888a0", "#dcc6d2", "#f5eef2", "#9d6a82", "#d4c0cc"];
        for (let i = 0; i < 55; i++) {
          confettiPieces.push({
            x: Math.random() * canvas.width,
            y: -20 - Math.random() * canvas.height * 0.5,
            w: 5 + Math.random() * 5,
            h: 7 + Math.random() * 8,
            vy: 0.6 + Math.random() * 1.2,
            vx: -0.6 + Math.random() * 1.2,
            rot: Math.random() * Math.PI,
            vr: -0.03 + Math.random() * 0.06,
            c: colors[Math.floor(Math.random() * colors.length)],
            a: 0.35 + Math.random() * 0.45,
          });
        }
        let frames = 0;
        function loop() {
          frames++;
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          confettiPieces.forEach(function (p) {
            p.y += p.vy;
            p.x += p.vx + Math.sin(p.y * 0.02) * 0.15;
            p.rot += p.vr;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.globalAlpha = p.a;
            ctx.fillStyle = p.c;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          });
          confettiPieces = confettiPieces.filter(function (p) {
            return p.y < canvas.height + 40;
          });
          if (confettiPieces.length && frames < 480) {
            rafId = requestAnimationFrame(loop);
          } else {
            confettiActive = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
          }
        }
        rafId = requestAnimationFrame(loop);
      }

      if (!isBirthdayToday()) {
        canvas.style.display = "none";
      }
    })();
  </script>
